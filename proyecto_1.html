<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web · Diseñadora Multimedia</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet" />

    <style>
        @font-face {
            font-family: 'Bentoga';
            src: url('https://fonts.cdnfonts.com/css/bentoga');
        }

        :root {
            --wine: #1341A2;
            --wine-hover: #3E85C1;
            --wine-light: #3E85C1;
            --wine-pale: #E8F2FB;

            --cream: #FFFFFF;
            --off-white: #F5F8FF;
            --sand: #DDE8F5;
            --dark: #000000;
            --mid: #1E3A6E;
            --soft: #5A7BA8;
            --white: #FFFFFF;

            --blue-dark: #1341A2;
            --blue-mid: #3E85C1;

            --grad-wine: linear-gradient(135deg, #1341A2 0%, #3E85C1 100%);
            --grad-cream: linear-gradient(160deg, #FFFFFF 0%, #F0F6FF 60%, #E8F4FD 100%);

            --sh-sm: 0 4px 20px rgba(19, 65, 162, .12);
            --sh-md: 0 10px 40px rgba(19, 65, 162, .16);

            --font-display: 'Bentoga';
            --font-body: 'Poppins', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            font-family: var(--font-body);
            background: var(--grad-cream);
            display: flex;
            flex-direction: column;
            cursor: none;
        }

        main {
            flex: 1;
        }

        /* ================= CURSOR ================= */
        .cur-dot {
            width: 7px;
            height: 7px;
            background: var(--blue-dark);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
        }

        .cur-ring {
            width: 30px;
            height: 30px;
            border: 1.5px solid var(--wine-light);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9998;
            transform: translate(-50%, -50%);
            opacity: .6;
        }

        @media (hover:none) {

            .cur-dot,
            .cur-ring {
                display: none;
            }

            body {
                cursor: auto;
            }
        }

        /* ================= NAV ================= */
        .nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 200;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5vw;
            background: rgba(255, 255, 255, .8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--sand);
        }

        .logo {
            height: 80px;
            width: auto;
            object-fit: contain;
            animation: float 4s ease-in-out infinite;
        }

        .btn-nav {
            font-size: .75rem;
            font-weight: 600;
            letter-spacing: .09em;
            text-transform: uppercase;
            color: var(--blue-dark);
            border: 1.5px solid var(--blue-dark);
            padding: 10px 24px;
            border-radius: 999px;
            text-decoration: none;
            transition: all .3s ease;
        }

        .btn-nav:hover {
            background: var(--grad-wine);
            color: white;
        }

        /* ================= GALERÍA ================= */
        .galeria {
            padding: 140px 5vw 60px;
        }

        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.2rem;
        }

        .galeria-item {
            background: var(--white);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: var(--sh-sm);
            transition: transform .3s, box-shadow .3s;
        }

        .galeria-item:hover {
            transform: translateY(-6px);
            box-shadow: var(--sh-md);
        }

        /* ⚠️ NO SE MODIFICÓ EL TAMAÑO */
        .img-box {
            width: 100%;
            height: 250px;
            background: var(--wine-pale);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ✅ IMAGEN SIN DEFORMAR */
        .img-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .galeria-texto {
            padding: 12px;
            font-size: 0.9rem;
            color: var(--mid);
            font-weight: 500;
            text-align: center;
        }

        .galeria-texto a {
            text-decoration: none;
            color: inherit;
        }

        @media (max-width: 900px) {
            .galeria-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .galeria-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ================= FOOTER ================= */
        .footer {
            padding: 2rem 5vw;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--soft);
            border-top: 1px solid var(--sand);
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(10px);
        }

        /* ================= ANIMACIÓN ================= */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-6px);
            }

            100% {
                transform: translateY(0px);
            }
        }
    </style>
</head>

<body>

    <!-- CURSOR -->
    <div class="cur-dot"></div>
    <div class="cur-ring"></div>

    <!-- NAV -->
    <nav class="nav">
        <img src="img/logo arriba.png" alt="Mariana Cruz" class="logo">
        <a href="index.html#contacto" class="btn-nav">Trabajemos juntas</a>
    </nav>

    <!-- CONTENIDO -->
    <main>
        <section class="galeria">
            <div class="galeria-grid">

                <!-- 1 -->
                <div class="galeria-item">
                    <div class="img-box">
                        <img src="proyecto_3/img/1.jpg">
                    </div>
                    <p class="galeria-texto">
                        <a href="proyecto_3/f_preyecto_3.pdf" target="_blank">
                            Proyecto 1
                        </a>
                    </p>
                </div>

                <!-- 2 -->
                <div class="galeria-item">
                    <div class="img-box">
                        <img src="img/Foto perfil.JPG">
                    </div>
                    <p class="galeria-texto">
                        <a href="proyecto_3/f_preyecto_3.pdf" target="_blank">
                            Proyecto 2
                        </a>
                    </p>
                </div>

                <!-- 3 -->
                <div class="galeria-item">
                    <div class="img-box">
                        <img src="img/Foto perfil.JPG">
                    </div>
                    <p class="galeria-texto">
                        <a href="proyecto_3/f_preyecto_3.pdf" target="_blank">
                            Proyecto 3
                        </a>
                    </p>
                </div>

                <!-- 4 -->
                <div class="galeria-item">
                    <div class="img-box">
                        <img src="img/Foto perfil.JPG">
                    </div>
                    <p class="galeria-texto">
                        <a href="proyecto_3/f_preyecto_3.pdf" target="_blank">
                            Proyecto 4
                        </a>
                    </p>
                </div>

            </div>
        </section>
    </main>
    <!-- FOOTER -->
    <footer class="footer">
        <p>© 2025 Mariana</p>
        <p>Producción Multimedia · Colombia</p>
    </footer>

    <!-- CURSOR SCRIPT -->
    <script>
        const dot = document.querySelector('.cur-dot');
        const ring = document.querySelector('.cur-ring');

        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';

            ring.style.left = e.clientX + 'px';
            ring.style.top = e.clientY + 'px';
        });
    </script>

</body>

</html>
